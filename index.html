<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond Us Check</title>
  <meta name="theme-color" content="#1a2057" />
  <style>
    :root {
      --bg: #1a2057;
      --bg2: #141843;
      --card: rgba(255,255,255,0.07);
      --card-border: rgba(245,240,232,0.15);
      --text: #f5f0e8;
      --sub: rgba(245,240,232,0.6);
      --primary: #a0b4ff;
      --primary-soft: rgba(160,180,255,0.15);
      --ivory: #f5f0e8;
      --line: rgba(245,240,232,0.12);
      --success: #6ee7b7;
      --danger: #fca5a5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #1a2057 0%, #141843 60%, #0f1230 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* 배경 양 장식 */
    .bg-sheep {
      position: fixed;
      pointer-events: none;
      opacity: 0.06;
      z-index: 0;
    }
    .bg-sheep.s1 { top: 5%; right: -20px; width: 180px; transform: scaleX(-1); }
    .bg-sheep.s2 { bottom: 12%; left: -30px; width: 220px; }
    .bg-sheep.s3 { top: 42%; right: 10px; width: 100px; opacity: 0.04; }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    /* 상단 헤더 카드 */
    .top-card {
      background: linear-gradient(135deg, #2a3580 0%, #1e2a6e 100%);
      border: 1px solid rgba(160,180,255,0.25);
      border-radius: 28px;
      padding: 28px 22px 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .top-card::after {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(160,180,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 헤더 양 일러스트 */
    .hero-sheep {
      position: absolute;
      right: 16px;
      bottom: 0;
      width: 100px;
    }

    .eyebrow {
      font-size: 13px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 900;
      color: var(--ivory);
      line-height: 1.2;
    }

    .desc {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--sub);
      max-width: 260px;
    }

    /* 카드 */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      padding: 20px 18px;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }

    .card-title {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 800;
      color: var(--ivory);
    }

    .card-sub {
      margin: 0 0 14px;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
    }

    .week-badge {
      display: inline-block;
      margin-bottom: 12px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid rgba(160,180,255,0.25);
    }

    .check-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 16px;
    }

    .check-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      transition: background 0.15s;
    }

    .check-item:has(input:checked) {
      background: rgba(160,180,255,0.12);
      border-color: rgba(160,180,255,0.3);
    }

    .check-item input {
      margin-top: 3px;
      transform: scale(1.2);
      accent-color: var(--primary);
    }

    .check-item label {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      cursor: pointer;
      color: var(--ivory);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #a0b4ff 0%, #7b9aff 100%);
      color: #1a2057;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--ivory);
      border: 1px solid var(--card-border);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    /* 진행 바 */
    .progress-track {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a0b4ff, #c4d0ff);
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    /* 통계 그리드 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      padding: 20px 18px;
      backdrop-filter: blur(8px);
    }

    .stat-sheep {
      width: 36px;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      color: var(--ivory);
    }

    /* 실천 현황 목록 */
    .count-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .count-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
    }

    .count-item-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--ivory);
      line-height: 1.4;
    }

    .count-item-count {
      min-width: 42px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      border: 1px solid rgba(160,180,255,0.3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      flex-shrink: 0;
    }

    .footer-note {
      color: var(--sub);
      font-size: 12px;
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }

    /* 작은 양 구분선 */
    .sheep-divider {
      text-align: center;
      margin: 4px 0 14px;
      font-size: 20px;
      opacity: 0.5;
    }
  </style>
</head>

  <script>
    const API_BASE = 'https://script.google.com/macros/s/AKfycbwE1WmjS02tZh-jUJOqGEOBobAG73RGpQhxkM9vbgk4xBrq5C-UB8r6vx9lVftaZLAobQ/exec';

    const weekTitleEl = document.getElementById('weekTitle');
    const checkListEl = document.getElementById('checkList');
    const countListEl = document.getElementById('countList');
    const totalCountEl = document.getElementById('totalCount');
    const submissionCountEl = document.getElementById('submissionCount');
    const statusMessageEl = document.getElementById('statusMessage');
    const submitBtn = document.getElementById('submitBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const checkForm = document.getElementById('checkForm');
    const GOAL_COUNT = 100;

    function renderProgress(totalCount) {
      const percent = Math.min(100, Math.round((totalCount / GOAL_COUNT) * 100));
      document.getElementById('goalText').textContent = totalCount;
      document.getElementById('goalCount').textContent = GOAL_COUNT;
      document.getElementById('progressPercent').textContent = `${percent}%`;
      document.getElementById('progressBar').style.width = `${percent}%`;
    }

    let currentConfig = null;

    async function fetchDashboard() {
      const res = await fetch(`${API_BASE}?action=dashboard&t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('현황을 불러오지 못했습니다.');
      return res.json();
    }

    function renderConfig(data) {
      currentConfig = data;
      weekTitleEl.textContent = data.weekTitle;
      checkListEl.innerHTML = '';
      data.items.forEach((item, index) => {
        const id = `item_${index}`;
        const div = document.createElement('div');
        div.className = 'check-item';
        div.innerHTML = `
          <input type="checkbox" id="${id}" name="items" value="${item}">
          <label for="${id}">${item}</label>
        `;
        checkListEl.appendChild(div);
      });
    }

    function renderCounts(data) {
      totalCountEl.textContent = data.totalCount;
      submissionCountEl.textContent = data.submissionCount;
      countListEl.innerHTML = '';
      data.items.forEach((item) => {
        const count = data.counts[item] || 0;
        const div = document.createElement('div');
        div.className = 'count-item';
        div.innerHTML = `
          <span class="count-item-name">${item}</span>
          <span class="count-item-count">${count}</span>
        `;
        countListEl.appendChild(div);
      });
      renderProgress(data.totalCount);
    }

    function setStatus(message, type = '') {
      statusMessageEl.textContent = message;
      statusMessageEl.className = `status ${type}`.trim();
    }

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getLastCheckDate() {
      return localStorage.getItem('beyondus_last_check_date');
    }

    function setLastCheckDate(dateStr) {
      localStorage.setItem('beyondus_last_check_date', dateStr);
    }

    function hasCheckedToday() {
      return getLastCheckDate() === getTodayKey();
    }

    function updateCheckAvailabilityUI() {
      if (hasCheckedToday()) {
        submitBtn.disabled = true;
        setStatus('오늘 체크는 완료되었어요. 내일 다시 참여해주세요.', 'success');
      } else {
        submitBtn.disabled = false;
      }
    }

    async function loadAll() {
      setStatus('현황을 불러오고 있어요...');
      const data = await fetchDashboard();
      renderConfig(data);
      renderCounts(data);
      setStatus('최신 현황으로 업데이트되었어요.', 'success');
    }

    async function submitCheck(items) {
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'submit', items })
      });
      if (!res.ok) throw new Error('체크 저장에 실패했습니다.');
      return res.json();
    }

    checkForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const checked = [...document.querySelectorAll('input[name="items"]:checked')].map(el => el.value);
      if (checked.length === 0) {
        setStatus('실천한 항목을 1개 이상 선택해주세요.', 'error');
        return;
      }
      submitBtn.disabled = true;
      refreshBtn.disabled = true;
      setStatus('체크를 저장하고 있어요...');
      try {
        await submitCheck(checked);
        setLastCheckDate(getTodayKey());
        document.querySelectorAll('input[name="items"]:checked').forEach(el => el.checked = false);
        const data = await fetchDashboard();
        renderConfig(data);
        renderCounts(data);
        updateCheckAvailabilityUI();
        setStatus('오늘의 실천이 저장되었어요.', 'success');
      } catch (err) {
        setStatus(err.message || '오류가 발생했습니다.', 'error');
      } finally {
        submitBtn.disabled = false;
        refreshBtn.disabled = false;
        updateCheckAvailabilityUI();
      }
    });

    refreshBtn.addEventListener('click', async () => {
      refreshBtn.disabled = true;
      submitBtn.disabled = true;
      try {
        await loadAll();
        updateCheckAvailabilityUI();
      } catch (err) {
        setStatus(err.message || '현황을 새로 불러오는 중 문제가 발생했어요.', 'error');
      } finally {
        refreshBtn.disabled = false;
        if (!hasCheckedToday()) submitBtn.disabled = false;
      }
    });

    loadAll()
      .then(() => { updateCheckAvailabilityUI(); })
      .catch(err => setStatus(err.message || '페이지를 불러오는 중 문제가 발생했어요.', 'error'));
  </script>
</body>
</html>
